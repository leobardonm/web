<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div id="header"></div>
    <div class="container">
        <form id="registerForm">
            <h2>Registro</h2>
            <div class="form-group">
                <label for="name">Nombre:</label>
                <input type="text" id="name" name="name" required placeholder="Tu nombre">
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="Tu email">
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required placeholder="Tu contraseña">
            </div>
            <button type="submit">Registrarse</button>
            <div id="message"></div>
        </form>
    </div>
    <footer>
        <div id="footer"></div>
    </footer>
<script>
// Cargar header y footer
fetch('header.html')
    .then(res => res.text())
    .then(html => document.getElementById('header').innerHTML = html);
fetch('footer.html')
    .then(res => res.text())
    .then(html => document.getElementById('footer').innerHTML = html);

// Registro funcionalidad
const registerForm = document.getElementById('registerForm');
const messageDiv = document.getElementById('message');
registerForm.addEventListener('submit', function(e) {
    e.preventDefault();
    messageDiv.textContent = '';
    messageDiv.className = '';
    const name = registerForm.name.value.trim();
    const email = registerForm.email.value.trim();
    const password = registerForm.password.value;
    // Validación básica
    if (!name || !email || !password) {
        messageDiv.textContent = 'Todos los campos son obligatorios.';
        messageDiv.className = 'error';
        return;
    }
    if (!email.includes('@') || !email.includes('.')) {
        messageDiv.textContent = 'Email inválido.';
        messageDiv.className = 'error';
        return;
    }
    // Guardar usuario en localStorage
    let users = JSON.parse(localStorage.getItem('users') || '[]');
    // Verificar si el email ya existe
    if (users.some(u => u.email === email)) {
        messageDiv.textContent = 'El email ya está registrado.';
        messageDiv.className = 'error';
        return;
    }
    const user = { name, email, password };
    users.push(user);
    localStorage.setItem('users', JSON.stringify(users));
    console.log('Usuario registrado:', user);
    messageDiv.textContent = 'Registro exitoso. Ahora puedes iniciar sesión.';
    messageDiv.className = 'success';
    registerForm.reset();
});
</script>
</body>
</html>
