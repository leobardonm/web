<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pokedex
    </title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div id="header"></div>
    <div class="container pokemon-container">
        <h2>Pokédex</h2>
        <p>Listado completo de Pokémon con filtros por nombre, ID y tipo.</p>

        <section class="pokemon-filters" aria-label="Filtros de Pokemon">
            <div class="form-group">
                <label for="filter-name">Nombre</label>
                <input type="text" id="filter-name" placeholder="Ejemplo: pikachu">
            </div>
            <div class="form-group">
                <label for="filter-id">ID</label>
                <input type="number" id="filter-id" min="1" placeholder="Ejemplo: 25">
            </div>
            <div class="form-group">
                <label for="filter-type">Tipo</label>
                <select id="filter-type">
                    <option value="">Todos</option>
                </select>
            </div>
            <button type="button" id="clear-filters">Limpiar filtros</button>
        </section>

        <p id="pokemon-status" class="pokemon-status">Cargando listado de Pokemon...</p>
        <div id="pokemon-grid" class="pokemon-grid" aria-live="polite"></div>
    </div>
    <footer>
        <div id="footer"></div>
    </footer>
<script>
// Cargar header y footer
fetch('header.html')
    .then(res => res.text())
    .then(html => document.getElementById('header').innerHTML = html);
fetch('footer.html')
    .then(res => res.text())
    .then(html => document.getElementById('footer').innerHTML = html);

// Protección de sesión
if (!localStorage.getItem('userToken')) {
    window.location.href = 'login.html';
}

const pokemonGrid = document.getElementById('pokemon-grid');
const pokemonStatus = document.getElementById('pokemon-status');
const filterNameInput = document.getElementById('filter-name');
const filterIdInput = document.getElementById('filter-id');
const filterTypeSelect = document.getElementById('filter-type');
const clearFiltersButton = document.getElementById('clear-filters');

let allPokemon = [];

function capitalize(text) {
    return text.charAt(0).toUpperCase() + text.slice(1);
}

function getPokemonIdFromUrl(url) {
    const match = url.match(/\/pokemon\/(\d+)\/?$/);
    return match ? Number(match[1]) : 0;
}

function createPokemonCard(pokemon) {
    const card = document.createElement('article');
    card.className = 'pokemon-card';

    const typesHtml = pokemon.types
        .map(type => `<span class="type-chip type-${type}">${capitalize(type)}</span>`)
        .join('');

    card.innerHTML = `
        <img src="${pokemon.image}" alt="${pokemon.name}" loading="lazy">
        <h3>${capitalize(pokemon.name)}</h3>
        <p><strong>ID:</strong> ${pokemon.id}</p>
        <p><strong>Altura:</strong> ${pokemon.height / 10} m</p>
        <p><strong>Peso:</strong> ${pokemon.weight / 10} kg</p>
        <div class="type-list"><strong>Tipo:</strong> ${typesHtml}</div>
    `;

    return card;
}

function renderPokemonList(pokemonList) {
    pokemonGrid.innerHTML = '';

    if (!pokemonList.length) {
        pokemonGrid.innerHTML = '<p class="error">No se encontraron Pokemon con esos filtros.</p>';
        return;
    }

    const fragment = document.createDocumentFragment();
    pokemonList.forEach(pokemon => fragment.appendChild(createPokemonCard(pokemon)));
    pokemonGrid.appendChild(fragment);
}

function applyFilters() {
    const nameValue = filterNameInput.value.trim().toLowerCase();
    const idValue = filterIdInput.value.trim();
    const typeValue = filterTypeSelect.value;

    const filtered = allPokemon.filter(pokemon => {
        const matchName = nameValue ? pokemon.name.includes(nameValue) : true;
        const matchId = idValue ? String(pokemon.id) === idValue : true;
        const matchType = typeValue ? pokemon.types.includes(typeValue) : true;
        return matchName && matchId && matchType;
    });

    pokemonStatus.textContent = `Mostrando ${filtered.length} de ${allPokemon.length} Pokemon.`;
    renderPokemonList(filtered);
}

async function loadTypes() {
    try {
        const response = await fetch('https://pokeapi.co/api/v2/type');
        const data = await response.json();

        data.results
            .filter(type => type.name !== 'unknown' && type.name !== 'shadow')
            .forEach(type => {
                const option = document.createElement('option');
                option.value = type.name;
                option.textContent = capitalize(type.name);
                filterTypeSelect.appendChild(option);
            });
    } catch (error) {
        console.error('Error cargando tipos:', error);
    }
}

async function loadAllPokemon() {
    pokemonStatus.textContent = 'Obteniendo listado completo de Pokemon...';

    try {
        const listResponse = await fetch('https://pokeapi.co/api/v2/pokemon?limit=2000&offset=0');
        const listData = await listResponse.json();

        const baseList = listData.results
            .map(item => ({
                name: item.name,
                id: getPokemonIdFromUrl(item.url),
                url: item.url
            }))
            .sort((a, b) => a.id - b.id);

        const batchSize = 25;
        for (let index = 0; index < baseList.length; index += batchSize) {
            const batch = baseList.slice(index, index + batchSize);
            const details = await Promise.all(batch.map(async item => {
                const detailResponse = await fetch(item.url);
                const detailData = await detailResponse.json();
                return {
                    id: detailData.id,
                    name: detailData.name,
                    types: detailData.types.map(t => t.type.name),
                    height: detailData.height,
                    weight: detailData.weight,
                    image: detailData.sprites.other['official-artwork'].front_default || detailData.sprites.front_default || ''
                };
            }));

            allPokemon.push(...details);
            pokemonStatus.textContent = `Cargando Pokemon: ${allPokemon.length}/${baseList.length}`;
        }

        pokemonStatus.textContent = `Pokemon cargados: ${allPokemon.length}`;
        applyFilters();
    } catch (error) {
        console.error('Error cargando Pokemon:', error);
        pokemonStatus.textContent = 'No se pudo cargar el listado completo de Pokemon.';
    }
}

filterNameInput.addEventListener('input', applyFilters);
filterIdInput.addEventListener('input', applyFilters);
filterTypeSelect.addEventListener('change', applyFilters);
clearFiltersButton.addEventListener('click', () => {
    filterNameInput.value = '';
    filterIdInput.value = '';
    filterTypeSelect.value = '';
    applyFilters();
});

Promise.all([loadTypes(), loadAllPokemon()]);
</script>
</body>
</html>
